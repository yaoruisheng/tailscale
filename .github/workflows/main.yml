name: Build Tailscale 1.94 DEB (Legacy Go)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION: 1.94.2-legacy
      ARCH: arm64

    steps:
    # 1️⃣ Checkout Tailscale
    - name: Checkout Tailscale
      uses: actions/checkout@v4
      with:
        repository: tailscale/tailscale
        ref: v1.94.2

    # 2️⃣ Install legacy Go
    - name: Install Legacy Go
      run: |
        curl -L -o go.tar.gz \
          https://github.com/yaoruisheng/go/releases/download/go-legacy-amd64-14/go-legacy-amd64.tar.gz
        mkdir -p $HOME/custom_go
        tar -xzf go.tar.gz -C $HOME/custom_go --strip-components=1
        echo "GOROOT=$HOME/custom_go" >> $GITHUB_ENV
        echo "PATH=$HOME/custom_go/bin:$PATH" >> $GITHUB_ENV

    # 3️⃣ Verify Go
    - name: Verify Go
      run: |
        which go
        go version

    # 4️⃣ Build binaries (直接 go build)
    - name: Build binaries
      run: |
        mkdir -p dist

        export CGO_ENABLED=0
        export GOOS=linux
        export GOARCH=${ARCH}

        LDFLAGS="-s -w \
          -X tailscale.com/version.Long=${VERSION} \
          -X tailscale.com/version.Short=${VERSION}"

        echo "Building tailscaled..."
        go build -v -ldflags="$LDFLAGS" -o dist/tailscaled ./cmd/tailscaled

        echo "Building tailscale CLI..."
        go build -v -ldflags="$LDFLAGS" -o dist/tailscale ./cmd/tailscale

    # 5️⃣ Build DEB package
    - name: Build DEB
      run: |
        mkdir -p pkg/{DEBIAN,usr/bin,usr/sbin,lib/systemd/system,etc/default}

        # Binaries
        cp dist/tailscale pkg/usr/bin/
        cp dist/tailscaled pkg/usr/sbin/
        chmod 755 pkg/usr/bin/tailscale
        chmod 755 pkg/usr/sbin/tailscaled

        # systemd service
        cp cmd/tailscaled/tailscaled.service pkg/lib/systemd/system/

        # defaults file
        cp cmd/tailscaled/tailscaled.defaults pkg/etc/default/tailscaled

        # maintainer scripts
        cp release/deb/debian.postinst.sh pkg/DEBIAN/postinst
        cp release/deb/debian.prerm.sh pkg/DEBIAN/prerm
        cp release/deb/debian.postrm.sh pkg/DEBIAN/postrm
        chmod 755 pkg/DEBIAN/*

        # calculate installed size
        SIZE=$(du -sk pkg | cut -f1)

        cat <<EOF > pkg/DEBIAN/control
        Package: tailscale
        Version: ${VERSION}
        Section: net
        Priority: extra
        Architecture: ${ARCH}
        Maintainer: Legacy Build <you@example.com>
        Installed-Size: ${SIZE}
        Replaces: tailscale-relay
        Conflicts: tailscale-relay
        Depends: iptables
        Recommends: iproute2
        Homepage: https://tailscale.com
        Description: Tailscale legacy build
         Built with legacy Go toolchain for kernel 4.4 devices.
        EOF

        dpkg-deb --build pkg tailscale_${VERSION}_${ARCH}.deb

    # 6️⃣ Upload artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tailscale-deb
        path: tailscale_${{ env.VERSION }}_${{ env.ARCH }}.deb

    # 7️⃣ Create GitHub Release
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: tailscale-${{ env.VERSION }}
        name: Tailscale ${{ env.VERSION }}
        files: tailscale_${{ env.VERSION }}_${{ env.ARCH }}.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
