name: Build Tailscale DEB (Legacy Go)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tailscale version (e.g., v1.94.2)'
        required: true
        default: 'v1.94.2'
      arch:
        description: 'Architecture'
        required: true
        default: 'arm64'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout 官方 Tailscale 源码
    - name: Checkout Tailscale
      uses: actions/checkout@v4
      with:
        repository: tailscale/tailscale
        ref: ${{ github.event.inputs.version }}

    # 2️⃣ 安装 legacy Go
    - name: Install Legacy Go
      run: |
        curl -L -o go.tar.gz \
          https://github.com/yaoruisheng/go/releases/download/go-legacy-amd64-14/go-legacy-amd64.tar.gz
        mkdir -p $HOME/custom_go
        tar -xzf go.tar.gz -C $HOME/custom_go --strip-components=1
        echo "GOROOT=$HOME/custom_go" >> $GITHUB_ENV
        echo "PATH=$HOME/custom_go/bin:$PATH" >> $GITHUB_ENV

    # 3️⃣ 验证 Go
    - name: Verify Go
      run: |
        which go
        go version

    # 4️⃣ 设置纯数字版本（去掉 v 前缀）
    - name: Set VERSION
      id: set_version
      run: |
        VERSION_RAW=${{ github.event.inputs.version }}
        VERSION=${VERSION_RAW#v}
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        # 同步覆盖 mkversion 输出，确保二进制不会带 -dev
        export VERSION_SHORT=${VERSION}
        export VERSION_LONG=${VERSION}
        echo "VERSION_SHORT=${VERSION_SHORT}" >> $GITHUB_ENV
        echo "VERSION_LONG=${VERSION_LONG}" >> $GITHUB_ENV

    # 5️⃣ 编译二进制
    - name: Build binaries
      run: |
        mkdir -p dist

        export CGO_ENABLED=0
        export GOOS=linux
        export GOARCH=${{ github.event.inputs.arch }}

        LDFLAGS="-s -w \
          -X tailscale.com/version.Long=${VERSION} \
          -X tailscale.com/version.Short=${VERSION}"

        echo "Building tailscaled..."
        go build -v -ldflags="$LDFLAGS" -o dist/tailscaled ./cmd/tailscaled

        echo "Building tailscale CLI..."
        go build -v -ldflags="$LDFLAGS" -o dist/tailscale ./cmd/tailscale

    # 6️⃣ 构建 DEB 包
    - name: Build DEB
      run: |
        mkdir -p pkg/{DEBIAN,usr/bin,usr/sbin,lib/systemd/system,etc/default}

        # Binaries
        cp dist/tailscale pkg/usr/bin/
        cp dist/tailscaled pkg/usr/sbin/
        chmod 755 pkg/usr/bin/tailscale
        chmod 755 pkg/usr/sbin/tailscaled

        # systemd service
        cp cmd/tailscaled/tailscaled.service pkg/lib/systemd/system/

        # defaults file
        cp cmd/tailscaled/tailscaled.defaults pkg/etc/default/tailscaled

        # maintainer scripts
        cp release/deb/debian.postinst.sh pkg/DEBIAN/postinst
        cp release/deb/debian.prerm.sh pkg/DEBIAN/prerm
        cp release/deb/debian.postrm.sh pkg/DEBIAN/postrm
        chmod 755 pkg/DEBIAN/*

        # calculate installed size
        SIZE=$(du -sk pkg | cut -f1)

        cat <<EOF > pkg/DEBIAN/control
        Package: tailscale
        Version: ${VERSION}
        Section: net
        Priority: extra
        Architecture: ${{ github.event.inputs.arch }}
        Maintainer: Legacy Build <https://github.com/${{ github.repository }}>
        Installed-Size: ${SIZE}
        Replaces: tailscale-relay
        Conflicts: tailscale-relay
        Depends: iptables
        Recommends: iproute2
        Homepage: https://tailscale.com
        Description: Tailscale legacy build
         Built with legacy Go toolchain for kernel 4.4 devices.
        EOF

        dpkg-deb --build -Zgzip pkg tailscale_${VERSION}_${{ github.event.inputs.arch }}.deb

    # 7️⃣ 上传 artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tailscale-deb
        path: tailscale_${{ env.VERSION }}_${{ github.event.inputs.arch }}.deb

    # 8️⃣ 创建 Release（workflow 所在仓库）
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        repository: ${{ github.repository }}        # ⚡ 自动使用当前仓库
        tag_name: ${{ github.event.inputs.version }}
        name: Tailscale ${{ github.event.inputs.version }}
        files: tailscale_${{ env.VERSION }}_${{ github.event.inputs.arch }}.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
