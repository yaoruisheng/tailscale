name: Build Tailscale with Custom Go

on:
  workflow_dispatch: # 手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 环境准备：拉取 Tailscale 官方源码
      - name: Checkout Tailscale Source
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: main # 你也可以指定标签，如 v1.58.2

      # 2. 下载并安装你自定义的 Go
      - name: Install Custom Go
        run: |
          # 下载你的 Release 压缩包
          curl -L -O https://github.com/yaoruisheng/go/releases/download/go-legacy-amd64-13/go-legacy-amd64.tar.gz
          
          # 创建一个目录并解压
          mkdir -p $HOME/custom_go
          tar -xzf go-legacy-amd64.tar.gz -C $HOME/custom_go --strip-components=1
          
          # 设置环境变量：将你的 Go 路径加入系统 PATH，并设置 GOROOT
          echo "$HOME/custom_go/bin" >> $GITHUB_PATH
          echo "GOROOT=$HOME/custom_go" >> $GITHUB_ENV

      # 3. 验证 Go 版本（确保输出是你自定义的版本）
      - name: Verify Go
        run: |
          go version
          go env

      # 4. 编译 Tailscale (tailscaled 和 tailscale)
      - name: Build Tailscale
        run: |
          mkdir -p dist
          # 禁用 CGO 以获得更好的兼容性，或者根据需要开启
          export CGO_ENABLED=0 
          export GOOS=linux
          export GOARCH=arm64
          echo "Building tailscaled..."
          go build -v -ldflags="-s -w" -o dist/tailscaled ./cmd/tailscaled
          
          echo "Building tailscale CLI..."
          go build -v -ldflags="-s -w" -o dist/tailscale ./cmd/tailscale

      # 5. 上传编译好的二进制文件
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-custom-go-bin
          path: dist/
